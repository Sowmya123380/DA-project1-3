{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Purchase Prediction</h2>

<div class="glass-card">

<table class="table table-dark">

<tr>
<th>ID</th>
<th>Prediction</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row.Customer_ID }}</td>

<td>

{% if row.Purchase_Prediction == 1 %}
Likely To Purchase
{% else %}
Not Likely
{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
