{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Customer Records</h2>

<div class="glass-card">

<table class="table table-dark table-striped">

<thead>

<tr>
<th>ID</th>
<th>Age</th>
<th>Location</th>
<th>Income</th>
<th>Spending</th>
</tr>

</thead>

<tbody>

{% for c in customers %}

<tr>

<td>{{ c.Customer_ID }}</td>
<td>{{ c.Age }}</td>
<td>{{ c.Location }}</td>
<td>{{ c.Annual_Income }}</td>
<td>{{ c.Total_Spending }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
