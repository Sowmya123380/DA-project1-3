{% extends 'base.html' %}

{% block content %}

<h1 class="page-title">Dashboard</h1>

<div class="row">

    <div class="col-md-4">
        <div class="glass-card">
            <h5>Total Customers</h5>
            <h2>{{ total_customers }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass-card">
            <h5>Total Revenue</h5>
            <h2>₹{{ total_revenue }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="glass-card">
            <h5>Active Customers</h5>
            <h2>{{ active_customers }}</h2>
        </div>
    </div>

</div>

<div class="glass-card mt-4">
    <canvas id="customerChart"></canvas>
</div>

<script>

    const ctx = document.getElementById('customerChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Customers', 'Revenue'],
            datasets: [{
                label: 'Analytics',
                data: [
                    {{ total_customers }},
            {{ total_revenue }}
            ]
    }]
    }
});

</script>

{% endblock %}
