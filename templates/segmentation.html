{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Customer Segmentation</h2>

<div class="glass-card">

<table class="table table-dark">

<tr>
<th>ID</th>
<th>Income</th>
<th>Spending</th>
<th>Segment</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row.Customer_ID }}</td>
<td>{{ row.Annual_Income }}</td>
<td>{{ row.Total_Spending }}</td>
<td>{{ row.Segment }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
